<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="树成林 AI 奶龙宇宙，一场由滚动、影像和 3D 卡牌共同驱动的互动体验。"
    />
    <meta name="theme-color" content="#b7153a" />
    <title>树成林 AI · 奶龙宇宙</title>
    <link rel="icon" href="data:," />
    <style>
      html, body { width: 100%; min-height: 100%; margin: 0; overflow-x: hidden; background: #f7fffd; font-family: Arial, sans-serif; }
      body.is-loading { height: 100vh; height: 100svh; overflow-y: hidden; }
      body:not(.brand-complete) > :not(.brand-intro):not(script) { display: none !important; }
      body > :not(.brand-intro) { visibility: hidden; }
      .brand-intro { position: fixed; inset: 0; z-index: 11000; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; padding: 0; border: 0; background: #f7fffd; color: #0b8168; text-align: center; }
      .brand-intro__stage { display: block; }
      .brand-intro__badge { position: relative; display: block; width: 156px; height: 156px; margin: 0 auto; }
      .brand-intro__ring { width: 100%; height: 100%; transform: rotate(-90deg); }
      .brand-intro__ring circle { fill: none; stroke: #14a98a; stroke-width: 3; }
      .brand-intro__ring-track { opacity: .16; }
      .brand-intro__ring-spin { opacity: .5; stroke-dasharray: 44 452; }
      .brand-intro__name, .brand-intro__line, .brand-intro__slogan { display: block; }
      .brand-intro__name { margin-top: 24px; }
      .brand-intro__cn { display: flex; justify-content: center; gap: 8px; }
      .brand-intro__cn i { font-style: normal; font-size: 42px; font-weight: 900; }
      .brand-intro__en { margin-top: 8px; font-size: 12px; font-weight: 700; }
      .brand-intro__line { width: 180px; height: 1px; margin: 18px auto; background: #14a98a; }
      .brand-intro__slogan { font-size: 13px; color: #315e54; }
      .styles-ready body > :not(.brand-intro) { visibility: visible; }
    </style>
  </head>
  <body class="is-loading">
    <button
      class="brand-intro"
      id="brand-intro"
      type="button"
      aria-label="树成林品牌入场动画，点击可跳过"
    >
      <span class="brand-intro__stage">
        <span class="brand-intro__badge" aria-hidden="true">
          <svg class="brand-intro__ring" viewBox="0 0 200 200">
            <defs>
              <linearGradient id="brand-intro-gradient" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#3be0bc"></stop>
                <stop offset="1" stop-color="#0b8168"></stop>
              </linearGradient>
            </defs>
            <circle class="brand-intro__ring-track" cx="100" cy="100" r="88"></circle>
            <circle class="brand-intro__ring-draw" cx="100" cy="100" r="88"></circle>
            <circle class="brand-intro__ring-spin" cx="100" cy="100" r="79"></circle>
          </svg>
          <span class="brand-intro__mark"></span>
          <span class="brand-intro__ripple"></span>
          <span class="brand-intro__ripple brand-intro__ripple--delayed"></span>
        </span>

        <span class="brand-intro__name">
          <span class="brand-intro__cn" aria-label="树成林">
            <i>树</i><i>成</i><i>林</i>
          </span>
          <span class="brand-intro__en">TREELIN</span>
        </span>
        <span class="brand-intro__line" aria-hidden="true"></span>
        <span class="brand-intro__slogan">AI 时代的创造者社群</span>
      </span>
    </button>

    <script>
      const earlyBrandIntro = document.querySelector("#brand-intro");
      earlyBrandIntro?.addEventListener("click", () => {
        earlyBrandIntro.dataset.skipRequested = "true";
      }, { once: true });
      window.addEventListener("load", () => {
        window.setTimeout(() => {
          const markup = document.createElement("script");
          markup.src = "app-markup.js?v=20260722-runtime-v18";
          markup.addEventListener("load", () => {
            markup.remove();
            const styles = document.createElement("link");
            styles.rel = "stylesheet";
            styles.href = "styles.css?v=20260722-runtime-v18";
            styles.addEventListener("load", () => {
              document.documentElement.classList.add("styles-ready");
              const runtime = document.createElement("script");
              runtime.src = "script.js?v=20260722-runtime-v18";
              document.body.append(runtime);
            }, { once: true });
            document.head.append(styles);
          }, { once: true });
          document.body.append(markup);
        }, 0);
      }, { once: true });
    </script>
  </body>
</html>
